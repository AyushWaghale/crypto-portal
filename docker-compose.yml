version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/crypto}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super-secret-key-change-me
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "npx prisma generate && npx prisma db push --accept-data-loss && npm start"

  worker:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/crypto}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    command: npm run start:worker

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://localhost:4000
    depends_on:
      - backend

